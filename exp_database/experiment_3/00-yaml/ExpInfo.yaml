Objective: 'This experiment aims to integrate image-derived and laboratory-derived traits within a machine learning framework, providing a comprehensive pipeline to classify and predict Solanum lycopersicum (cultivar Tiny Tim) responses to drought and salinity stresses of varying intensities.'
Description: '30 Solanum lycopersicum cv. Tiny Tim seeds were sown and covered in complete darkness for 72 hours. Once the cotyledons emerged, the seedlings were grown under a 16-hour light / 8-hour dark cycle. The Tiny Tim cultivar, grown during summer season, experienced an average of 144 μmol·m−2·s−1 photosynthetically active radiation (PAR), 40-50% relative humidity, and 22-27°C temperatures. Salt and water stress levels were determined and imposed according to Assimakopoulou et al. 2015 and Hoffman et al., 2021, starting 3 weeks after germination (23 days after germination, DAG) and continuing for 14 days, to gradually achieve 5 different treatments:1. Optimal growth (Ctrl): 60% water holding capacity (WHC) with tap water;2. Medium drought stress (Drought_01): to be reached gradually by the endpoint, 40% WHC;3. High drought stress (Drought_02): 25% WHC, to be reached gradually by the endpoint;4. Medium salt stress (Salt_01): irrigated daily with 50 mL of saline solution to pile up 25 mM NaCl by day and reach a final concentration of 175 mM;5. High salt stress (Salt_02): irrigated daily with 100 mL of saline solution, to pile up 25 mM of NaCl by day and reach a final concentration of 350 mM.The experiments followed a completely randomized design with 6 biological replicates per condition. Laboratory sampling occurred at two time points: midpoint, which corresponded to 7 days after stress (DAS), and endpoint, which corresponded to 14 DAS. Imaging events (RGB imaging, FC imaging) took place twice a week (Monday-Thursday) along the whole experiment.'
